name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render-services:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping backend and ML services
        env:
          BACKEND_HEALTH_URL: https://freshly-backend-5vmz.onrender.com/health
          BACKEND_ML_STATUS_URL: https://freshly-backend-5vmz.onrender.com/api/ml/status
          ML_HEALTH_URL: https://freshly-ml.onrender.com/health
        run: node backend/scripts/render-keepalive.js
