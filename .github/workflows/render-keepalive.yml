name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend and ML endpoints
        env:
          BACKEND_HEALTH_URL: https://freshly-backend.onrender.com/health
          BACKEND_ML_STATUS_URL: https://freshly-backend.onrender.com/api/ml/status
          ML_HEALTH_URL: https://freshly-ml.onrender.com/health
        run: |
          echo "Pinging $BACKEND_HEALTH_URL"
          curl --fail --silent --show-error --max-time 20 "$BACKEND_HEALTH_URL" > /dev/null

          echo "Pinging $BACKEND_ML_STATUS_URL"
          curl --fail --silent --show-error --max-time 25 "$BACKEND_ML_STATUS_URL" > /dev/null

          echo "Pinging $ML_HEALTH_URL"
          curl --fail --silent --show-error --max-time 25 "$ML_HEALTH_URL" > /dev/null

          echo "Keepalive checks completed."
